name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      env:
        ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo $ENCODED_KEYSTORE | base64 -di > app/release.jks

    - name: Build with Gradle
      env:
        KEYSTORE_PATH: release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    - name: Rename APK
      id: rename_apk
      run: |
        # Determine version name
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION="manual-build"
        fi
        
        NEW_NAME="BCardTools_${VERSION}.apk"
        # Move and Rename
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/$NEW_NAME
        
        # Save name for next steps
        echo "apk_name=$NEW_NAME" >> $GITHUB_OUTPUT
        echo "apk_path=app/build/outputs/apk/release/$NEW_NAME" >> $GITHUB_OUTPUT

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.rename_apk.outputs.apk_name }}
        path: ${{ steps.rename_apk.outputs.apk_path }}

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        body_path: RELEASE_NOTES.txt
        files: ${{ steps.rename_apk.outputs.apk_path }}
        token: ${{ secrets.GITHUB_TOKEN }}
