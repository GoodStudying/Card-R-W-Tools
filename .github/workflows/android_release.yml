name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      env:
        ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo $ENCODED_KEYSTORE | base64 -di > app/release.jks

    - name: Build with Gradle
      env:
        KEYSTORE_PATH: release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease assembleDebug

    - name: Rename APK
      id: rename_apk
      run: |
        # Determine version name
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION="manual-build"
        fi
        
        # 1. Rename Release APK
        RELEASE_NAME="BCardTools_${VERSION}.apk"
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/$RELEASE_NAME
        
        # 2. Rename Debug (Beta) APK
        BETA_NAME="BCardTools_${VERSION}_Beta.apk"
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/$BETA_NAME
        
        # Output paths
        echo "apk_path_release=app/build/outputs/apk/release/$RELEASE_NAME" >> $GITHUB_OUTPUT
        echo "apk_path_beta=app/build/outputs/apk/debug/$BETA_NAME" >> $GITHUB_OUTPUT

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: BCardTools_APKs
        path: |
          ${{ steps.rename_apk.outputs.apk_path_release }}
          ${{ steps.rename_apk.outputs.apk_path_beta }}

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        body_path: RELEASE_NOTES.txt
        files: |
          ${{ steps.rename_apk.outputs.apk_path_release }}
          ${{ steps.rename_apk.outputs.apk_path_beta }}
  release_to_gitee:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: BCardTools_APKs
          path: app/build/outputs/apk/release/

      - name: Create Gitee Release and Upload
        uses: nicennnnnnnlee/action-gitee-release@v2.0.0
        with:
          gitee_action: create_release
          gitee_token: ${{ secrets.GITEE_TOKEN }}
          gitee_owner: ${{ secrets.GITEE_USER }}
          gitee_repo: Bambu-Card-Tools
          gitee_tag_name: ${{ github.ref_name }}
          gitee_release_name: ${{ github.ref_name }}
          gitee_release_body: "Synced release from GitHub Actions."
          gitee_files: |
            app/build/outputs/apk/release/*.apk
