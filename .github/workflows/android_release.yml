name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - '正式版*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required for git commit count in gradle

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      env:
        ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo $ENCODED_KEYSTORE | base64 -di > app/release.jks

    - name: Determine Version
      id: determine_version
      run: |
        if [[ $GITHUB_REF == refs/tags/正式版* ]]; then
          echo "Build type: Release"
          # Remove prefix '正式版'
          VERSION_NAME=${GITHUB_REF#refs/tags/正式版}
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "IS_RELEASE=true" >> $GITHUB_ENV
        elif [[ $GITHUB_REF == refs/tags/v* ]]; then
          echo "Build type: Beta"
          # Remove prefix 'v'
          TAG=${GITHUB_REF#refs/tags/}
          VERSION_NAME=${TAG#v}
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "IS_RELEASE=false" >> $GITHUB_ENV
        else
           echo "Manual build"
           echo "VERSION_NAME=0.0.0-manual" >> $GITHUB_ENV
           echo "IS_RELEASE=false" >> $GITHUB_ENV
        fi

    - name: Build with Gradle
      env:
        KEYSTORE_PATH: release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        VERSION_NAME: ${{ env.VERSION_NAME }}
      run: ./gradlew assembleRelease assembleDebug

    - name: Rename APK
      id: rename_apk
      run: |
        VERSION="${{ env.VERSION_NAME }}"
        
        # 1. Rename Release APK
        if [[ "$IS_RELEASE" == "true" ]]; then
             # Formal release
             RELEASE_NAME="BCardTools_v${VERSION}_Release.apk"
        else
             # Beta release
             RELEASE_NAME="BCardTools_v${VERSION}_Beta_Release.apk"
        fi
        
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/$RELEASE_NAME
        echo "apk_path_release=app/build/outputs/apk/release/$RELEASE_NAME" >> $GITHUB_OUTPUT
        
        # 2. Rename Debug APK (Always keep for debugging)
        DEBUG_NAME="BCardTools_v${VERSION}_Debug.apk"
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/$DEBUG_NAME
        echo "apk_path_beta=app/build/outputs/apk/debug/$DEBUG_NAME" >> $GITHUB_OUTPUT

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: BCardTools_APKs
        path: |
          ${{ steps.rename_apk.outputs.apk_path_release }}
          ${{ steps.rename_apk.outputs.apk_path_beta }}

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        body_path: RELEASE_NOTES.txt
        files: |
          ${{ steps.rename_apk.outputs.apk_path_release }}
          ${{ steps.rename_apk.outputs.apk_path_beta }}
  sync_to_gitee:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 确保获取所有历史和标签

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Add Gitee Remote
        run: |
          git remote add gitee https://${{ secrets.GITEE_USER }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USER }}/Bambu-Card-Tools.git

      - name: Push Code to Gitee
        run: |
          git push gitee main --force

      - name: Push Tags to Gitee
        run: |
          git push gitee --tags --force

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: BCardTools_APKs
          path: build_artifacts

      - name: Prepare Assets
        run: |
          mkdir -p release_assets
          find build_artifacts -name "*.apk" -exec cp {} release_assets/ \;
          ls -R release_assets

      - name: Create Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          RELEASE_NAME="${TAG_NAME}"
          
          # 创建Gitee Release
          curl -X POST "https://gitee.com/api/v5/repos/${{ secrets.GITEE_USER }}/Bambu-Card-Tools/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${GITEE_TOKEN}\",
              \"tag_name\": \"${TAG_NAME}\",
              \"name\": \"${RELEASE_NAME}\",
              \"body\": \"Synced release from GitHub Actions.\",
              \"target_commitish\": \"main\"
            }" > release_response.json
          
          # 获取Release ID
          RELEASE_ID=$(cat release_response.json | grep -o '"id":[0-9]*' | head -1 | cut -d':' -f2)
          echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_ENV

      - name: Upload Assets to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          for file in release_assets/*.apk; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              echo "Uploading $filename..."
              curl -X POST "https://gitee.com/api/v5/repos/${{ secrets.GITEE_USER }}/Bambu-Card-Tools/releases/${{ env.RELEASE_ID }}/attach_files" \
                -H "Content-Type: multipart/form-data" \
                -F "access_token=${GITEE_TOKEN}" \
                -F "file=@${file}"
            fi
          done